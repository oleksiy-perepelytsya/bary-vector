name: barygraph-kaikki

services:
  mongodb:
    # MongoDB Community 8.x + bundled mongot (Atlas Search / Vector Search local)
    image: mongodb/mongodb-atlas-local:8
    container_name: barygraph-mongo
    ports:
      # Host port 27117 so tests/dev never collide with other local Mongos.
      - "27117:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  ollama:
    image: ollama/ollama:latest
    container_name: barygraph-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    profiles: ["gpu"]

volumes:
  mongo_data:
  ollama_models:
