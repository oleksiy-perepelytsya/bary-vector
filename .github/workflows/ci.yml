name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy

      - name: Unit tests
        run: pytest -m "not integration" --cov=lib --cov-report=term

  integration:
    runs-on: ubuntu-latest
    needs: lint-test
    services:
      mongodb:
        image: mongodb/mongodb-atlas-local:8
        ports:
          - 27117:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    env:
      MONGO_URI: mongodb://localhost:27117/?directConnection=true
      BARY_FAKE_EMBED: "1"
      KAIKKI_PATH: tests/fixtures/kaikki-sample.jsonl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Integration tests
        run: pytest -m integration -v
